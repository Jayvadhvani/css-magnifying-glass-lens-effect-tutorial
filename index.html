    .lens {
      position: absolute;

      border-radius: 50%;

      /* Magic happens here: The background image is identical to main image */
      background-image: url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=1200&q=80');
      background-repeat: no-repeat;
      
      /* Initially hidden */
      opacity: 0;
      pointer-events: none; /* So the mouse events pass through to container */
      transition: opacity 0.2s;
    }

    /* Show lens on hover */
    .image-container:hover .lens {
      opacity: 1;
    }

  <h2>CSS Magnifying Glass Effect</h2>
  <p>Hover your mouse over the image below to inspect the details using a custom magnifying glass lens!</p>

  <div class="image-container" id="container">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&amp;fit=crop&amp;w=600&amp;q=80" class="main-image" id="mainImage" alt="Sneaker">
    <div class="lens" id="lens"></div>
  </div>

  <script>
    const container = document.getElementById('container');
    const lens = document.getElementById('lens');
    const mainImage = document.getElementById('mainImage');

    // Zoom level (e.g., 2 means the lens background is 2x larger than the image)
    const zoomLevel = 2;

    container.addEventListener('mousemove', (e) => {
      // 1. Get the cursor position relative to the container
      const rect = container.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      // 2. Center the lens exactly on the cursor
      const lensRadius = lens.offsetWidth / 2;
      lens.style.left = `${x - lensRadius}px`;
      lens.style.top = `${y - lensRadius}px`;

      // 3. Set the size of the background image inside the lens based on zoom level
      const bgWidth = mainImage.width * zoomLevel;
      const bgHeight = mainImage.height * zoomLevel;
      lens.style.backgroundSize = `${bgWidth}px ${bgHeight}px`;

      // 4. Move the background image inside the lens in the opposite direction
      const bgPosX = (x * zoomLevel) - lensRadius;
      const bgPosY = (y * zoomLevel) - lensRadius;
      lens.style.backgroundPosition = `-${bgPosX}px -${bgPosY}px`;
    });
  </script>
